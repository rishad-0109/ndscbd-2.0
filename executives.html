<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Executives</title>

  <link rel="stylesheet" href="css/executives.css">
  <link rel="stylesheet" href="css/nav.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="css/footer.css">
  <script src="js/nav.js" defer></script>
</head>

<body>

  <div class="floating-blur"></div>
  <div class="floating-blur blur2"></div>

  <!-- PATRONS -->
  <div class="container">
    <h1>MEET OUR <span>PATRONS</span></h1>
  </div>

  <section class="patron-section">
    <div class="patron">
      <img src="images/Principal.jpg" alt="Principal">
      <h3>Dr.Fr.Hemanto Pius Rozario,CSC</h3>
      <p>Principal</p>
    </div>
    <div class="patron">
      <img src="images/Titas-sir.jpg" alt="Club Moderator">
      <h3>Dr.Vincent Titas Rozario</h3>
      <p>Club Moderator</p>
    </div>
  </section>

  <!-- EXECUTIVES — tabs and cards built entirely by JS -->
  <div class="container">
    <h1>MEET THE <span>EXECUTIVES</span></h1>
    <div class="year-buttons" id="year-buttons"></div>
    <div id="panels-container"></div>
  </div>

  <!-- FOOTER -->

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <img id="modal-img" alt="">
      <h2 id="modal-name"></h2>
      <h4 id="modal-position"></h4>
      <p id="modal-department"></p>
      <p id="modal-description"></p>
    </div>
  </div>

  <!-- Load data first, then the renderer -->
  <script src="js/executives-data.js"></script>
  <script src="js/executives.js"></script>

  <div id="footer-placeholder"></div>
  <script src="js/footer.js"></script>
</body>
</html>
