<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Developers</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:linear-gradient(180deg,#020412,#030a25);
color:white;
font-family:sans-serif;
text-align:center;
padding:80px 10%;
}

/* TITLE */

.dev-title{
font-size:40px;
margin-bottom:60px;
color:#00eaff;
text-shadow:0 0 20px #00eaff;
}

/* CARDS */

.dev-container{
display:flex;
justify-content:center;
gap:50px;
flex-wrap:wrap;
}

.dev-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(0,255,255,0.2);
padding:30px;
border-radius:20px;
width:260px;
transition:0.4s;
}

.dev-card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px rgba(0,255,255,0.5);
}

.dev-card img{
width:100%;
border-radius:15px;
margin-bottom:15px;
object-fit: contain;
}

.dev-card h3{
color:#00eaff;
}

.back-btn{
display:inline-block;
margin-top:60px;
padding:12px 25px;
border-radius:10px;
background:#00eaff;
color:#00111f;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<h1 class="dev-title">🚀 Meet The Developers</h1>

<div class="dev-container">

<div class="dev-card">
<img src="images/PR-ICT.png">
<h3>Shantanu Paul</h3>
<p>President(ICT)</p>
</div>

<div class="dev-card">
<img src="images/rishad-2.jpeg">
<h3>Rishad Ar Rashid</h3>
<p>Organizer</p>
</div>

</div>

<a href="index.html" class="back-btn">⬅ Back to Home</a>

</body>

</html>
